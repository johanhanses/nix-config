# sesh — smart tmux session manager
# https://github.com/joshmedeski/sesh
#
# Sesh auto-discovers existing tmux sessions out of the box, so once `wt` /
# `wtp` have spun up per-repo sessions they show up in the picker without
# any config. Static sessions below surface common repo roots in the picker
# even before they've been opened.
#
# Picker keybind: <prefix>+T in tmux (see tmux/tmux.conf). From any shell:
# `wts` opens the same picker without needing the prefix key.
#
# Work/client repo entries live in an untracked overlay, kept out of this repo.
import = ["~/.config/sesh/local.toml"]

[[session]]
name = "nix-config"
path = "~/Repos/github.com/johanhanses/nix-config"

[[session]]
name = "zettelkasten"
path = "~/Repos/github.com/johanhanses/zettelkasten"

# Add more as needed:
# [[session]]
# name = "<repo-basename>"
# path = "<absolute-or-tilde-path>"
